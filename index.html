<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>鬼ごっこ</title>

<style>
  #game {
    width: 90vw;
    height: 90vw;
    max-width: 600px;
    max-height: 600px;
    background: #eef;
    position: relative;
    border: 2px solid #333;
    margin: 0 auto;
  }

  .island {
    position: absolute;
    background: #fff;
    border: 2px solid #333;
    border-radius: 50%;
    z-index: 1;
  }

  .player, .oni, .house {
    position: absolute;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    width: 12vw;
    height: 12vw;
    max-width: 70px;
    max-height: 70px;
    z-index: 10;
  }
  .player { background-image: url("Child.png"); }
  .oni    { background-image: url("oni.png"); }
  .house  { background-image: url("ie.png"); display:none; pointer-events:none; }

  .bridge {
    position: absolute;
    background: #444;
    height: 4px;
    transform-origin: left center;
    pointer-events: none;
    z-index: 5;
  }

  .game-btn {
    font-size: 20px;
    padding: 12px 24px;
    margin: 10px;
    border-radius: 8px;
    border: 2px solid #333;
    background: #fff;
    cursor: pointer;
  }
  .game-btn:disabled {
    opacity: 0.5;
    cursor: default;
  }

  @media (max-width: 600px) {
    .game-btn {
      font-size: 24px;
      padding: 16px 28px;
    }
  }

  @keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 1; }
  }
  .blink {
    animation: blink 0.4s infinite;
  }
</style>
</head>
<body>

<h2>鬼ごっこゲーム</h2>
<p style="font-size:18px; font-weight:bold;">子どもは2マス、鬼は1マス</p>
<p style="font-size:18px; font-weight:bold;">4ターン行動すると家（ゴール）が出現します</p>

<div id="message" style="font-size:20px; font-weight:bold; margin:10px 0; color:red;">
  子どものスタート位置を選んでください
</div>

<button id="startBtn" class="game-btn" disabled>ゲーム開始</button>
<button id="resetBtn" class="game-btn">リセット</button>

<div id="game"></div>

<script>
  const game = document.getElementById("game");

  /* ★ レベル管理 */
  let oniLevel = 1;     // 1〜4
  let childLevel = 1;   // 1〜5

  /* ★ 鬼の画像更新 */
  function updateOniImage() {
    if (oniLevel === 1) oni.style.backgroundImage = 'url("oni.png")';
    if (oniLevel === 2) oni.style.backgroundImage = 'url("oni2.png")';
    if (oniLevel === 3) oni.style.backgroundImage = 'url("oni3.png")';
    if (oniLevel === 4) oni.style.backgroundImage = 'url("oni4.png")';
  }

  /* ★ 子どもの画像更新 */
  function updateChildImage() {
    if (childLevel === 1) player.style.backgroundImage = 'url("Child.png")';
    if (childLevel === 2) player.style.backgroundImage = 'url("Child2.png")';
    if (childLevel === 3) player.style.backgroundImage = 'url("Child3.png")';
    if (childLevel === 4) player.style.backgroundImage = 'url("Child4.png")';
    if (childLevel === 5) player.style.backgroundImage = 'url("Child5.png")';
  }

  /* --- 島生成 --- */

  const islandRatio = [
    {x:1/6, y:1/6}, {x:3/6, y:1/6}, {x:5/6, y:1/6},
    {x:1/6, y:3/6}, {x:3/6, y:3/6}, {x:5/6, y:3/6},
    {x:1/6, y:5/6}, {x:3/6, y:5/6}, {x:5/6, y:5/6}
  ];

  let islandPos = [];
  let islandSize = 0;

  function computeIslandPos() {
    const rect = game.getBoundingClientRect();
    const w = rect.width;

    islandSize = w * 0.16;

    islandPos = islandRatio.map(r => ({
      x: r.x * w - islandSize / 2,
      y: r.y * w - islandSize / 2
    }));

    const islands = document.querySelectorAll(".island");
    if (islands.length === 0) return;

    islands.forEach(d => {
      d.style.width = islandSize + "px";
      d.style.height = islandSize + "px";
    });
  }

  for (let i=0;i<9;i++){
    const d=document.createElement("div");
    d.className="island";
    game.appendChild(d);
  }

  computeIslandPos();

  function renderIslands() {
    const islands = document.querySelectorAll(".island");
    islands.forEach((d,i)=>{
      d.style.left = islandPos[i].x + "px";
      d.style.top  = islandPos[i].y + "px";
    });
  }
  renderIslands();

  /* --- 橋生成 --- */

  function getNeighborPairs() {
    const pairs = [];
    const dirs = [
      {dx: 0, dy:-1}, {dx: 0, dy: 1},
      {dx:-1, dy: 0}, {dx: 1, dy: 0},
      {dx:-1, dy:-1}, {dx: 1, dy:-1},
      {dx:-1, dy: 1}, {dx: 1, dy: 1}
    ];

    for (let i = 0; i < 9; i++) {
      const x = i % 3;
      const y = Math.floor(i / 3);

      dirs.forEach(d => {
        const nx = x + d.dx;
        const ny = y + d.dy;

        if (nx >= 0 && nx < 3 && ny >= 0 && ny < 3) {
          const j = ny * 3 + nx;
          if (i < j) pairs.push({a: i, b: j});
        }
      });
    }
    return pairs;
  }

  function segmentsCross(p1, p2, p3, p4) {
    function ccw(a, b, c) {
      return (c.y - a.y) * (b.x - a.x) > (b.y - a.y) * (c.x - a.x);
    }
    return (ccw(p1, p3, p4) !== ccw(p2, p3, p4)) &&
           (ccw(p1, p2, p3) !== ccw(p1, p2, p4));
  }

  function isCrossing(newEdge, edges) {
    const p1 = islandPos[newEdge.a];
    const p2 = islandPos[newEdge.b];

    for (let e of edges) {
      const p3 = islandPos[e.a];
      const p4 = islandPos[e.b];

      if (newEdge.a === e.a || newEdge.a === e.b ||
          newEdge.b === e.a || newEdge.b === e.b) continue;

      if (segmentsCross(p1, p2, p3, p4)) return true;
    }
    return false;
  }

  let edges = [];

  function generateEdges() {
    edges = [];
    const candidates = getNeighborPairs();

    const maxEdges = Math.random() < 0.5 ? 12 : 13;

    for (let i = candidates.length - 1; i > 0; i--) {
      const r = Math.floor(Math.random() * (i + 1));
      [candidates[i], candidates[r]] = [candidates[r], candidates[i]];
    }

    for (let c of candidates) {
      if (edges.length >= maxEdges) break;

      const involvesCenter = (c.a === 4 || c.b === 4);
      if (involvesCenter) {
        const centerCount = edges.filter(e => e.a === 4 || e.b === 4).length;
        if (centerCount >= 4) continue;
      }

      if (!isCrossing(c, edges)) {
        edges.push(c);
      }
    }
  }
  generateEdges();

  function drawBridges(){
    edges.forEach(e=>{
      const p1=islandPos[e.a];
      const p2=islandPos[e.b];
      const dx=p2.x-p1.x;
      const dy=p2.y-p1.y;
      const len=Math.hypot(dx,dy);

      const br=document.createElement("div");
      br.className="bridge";
      br.style.left=p1.x + islandSize/2 + "px";
      br.style.top =p1.y + islandSize/2 + "px";
      br.style.width=len+"px";
      br.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;
      game.appendChild(br);
    });
  }
  drawBridges();

  function clearBridges() {
    document.querySelectorAll(".bridge").forEach(b => b.remove());
  }

  let graph = Array.from({length:9},()=>[]);
  function rebuildGraph() {
    graph = Array.from({length:9},()=>[]);
    edges.forEach(e=>{
      graph[e.a].push(e.b);
      graph[e.b].push(e.a);
    });
  }
  rebuildGraph();

  /* --- キャラ生成 --- */

  const player = document.createElement("div");
  player.className="player";
  player.style.display = "none";
  game.appendChild(player);

  const oni = document.createElement("div");
  oni.className="oni";
  oni.style.display = "none";
  game.appendChild(oni);

  const house = document.createElement("div");
  house.className="house";
  game.appendChild(house);

  let playerNode = null;
  let oniNode = null;
  let houseNode = null;
  let turn = 0;
  let gameState = "setPlayer";

  function renderCharacters(){
    const pw = player.offsetWidth;
    const ph = player.offsetHeight;
    const ow = oni.offsetWidth;
    const oh = oni.offsetHeight;
    const hw = house.offsetWidth;
    const hh = house.offsetHeight;

    if(playerNode !== null){
      player.style.left = (islandPos[playerNode].x + islandSize/2 - pw/2) + "px";
      player.style.top  = (islandPos[playerNode].y + islandSize/2 - ph/2) + "px";
    }
    if(oniNode !== null){
      oni.style.left = (islandPos[oniNode].x + islandSize/2 - ow/2) + "px";
      oni.style.top  = (islandPos[oniNode].y + islandSize/2 - oh/2) + "px";
    }
    if(houseNode !== null){
      house.style.left = (islandPos[houseNode].x + islandSize/2 - hw/2) + "px";
      house.style.top  = (islandPos[houseNode].y + islandSize/2 - hh/2) + "px";
    }
  }

  /* --- BFS（鬼の追跡） --- */

  function bfs(start){
    let dist=Array(9).fill(Infinity);
    dist[start]=0;
    let q=[start];
    while(q.length){
      let v=q.shift();
      for(let nx of graph[v]){
        if(dist[nx]>dist[v]+1){
          dist[nx]=dist[v]+1;
          q.push(nx);
        }
      }
    }
    return dist;
  }

  function moveOni(){
    let dist = bfs(playerNode);
    let next = oniNode;
    for(let nx of graph[oniNode]){
      if(dist[nx] < dist[next]) next = nx;
    }
    oniNode = next;
  }

  function checkCatch(){
    return playerNode === oniNode;
  }

  /* --- 捕まった --- */

  function caughtAction() {
    playerNode = oniNode;
    renderCharacters();

    player.classList.add("blink");
    oni.classList.add("blink");

    setTimeout(()=>{
      alert("捕まった！ ターン数: " + turn);
      gameState = "caughtEnd";
      document.getElementById("resetBtn").click();
    }, 1200);
  }

  /* --- 家 --- */

  function spawnHouse() {
    houseNode = Math.floor(Math.random() * 9);
    house.style.display = "block";
    renderCharacters();
  }

  function checkHouse() {
    if (houseNode !== null && playerNode === houseNode) {

      house.classList.add("blink");
      setTimeout(()=>{
        alert("クリア！ 家に到着しました！");
        gameState = "clearEnd";
        document.getElementById("resetBtn").click();
      }, 1200);
      return true;
    }
    return false;
  }

  /* --- メッセージ更新 --- */

  function updateMessage() {
    const msg = document.getElementById("message");

    if (gameState === "setPlayer") msg.textContent = "子どものスタート位置を選んでください";
    else if (gameState === "setOni") msg.textContent = "次に鬼のスタート位置を選んでください";
    else if (gameState === "ready") msg.textContent = "ゲーム開始ボタンを押してください";
    else if (gameState === "playStep1") msg.textContent = "子ども 1歩目：移動先の島を選んでください";
    else if (gameState === "playStep2") msg.textContent = "子ども 2歩目：移動先の島を選んでください";
    else if (gameState === "oniTurn") msg.textContent = "鬼が移動中…";
  }

  updateMessage();

  /* --- クリック処理 --- */

  game.addEventListener("click", e=>{
    const rect = game.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    for(let i=0;i<9;i++){
      let dx = x - (islandPos[i].x + islandSize/2);
      let dy = y - (islandPos[i].y + islandSize/2);
      if(Math.hypot(dx,dy) < islandSize/2){

        if(gameState === "setPlayer"){
          playerNode = i;
          player.style.display = "block";
          updateChildImage();
          renderCharacters();
          gameState = "setOni";
          updateMessage();
          return;
        }

        if(gameState === "setOni"){
          oniNode = i;
          oni.style.display = "block";
          updateOniImage();
          renderCharacters();
          gameState = "ready";
          document.getElementById("startBtn").disabled = false;
          updateMessage();
          return;
        }

        if(gameState === "playStep1"){
          if(graph[playerNode].includes(i)){
            playerNode = i;
            renderCharacters();
            if (checkHouse()) return;
            gameState = "playStep2";
            updateMessage();
          }
          return;
        }

        if(gameState === "playStep2"){
          if(graph[playerNode].includes(i)){
            playerNode = i;
            turn++;
            renderCharacters();

            if (checkHouse()) return;
            if(checkCatch()){ caughtAction(); return; }

            if (turn === 4 && houseNode === null) spawnHouse();

            gameState = "oniTurn";
            updateMessage();
            moveOni();
            renderCharacters();

            if(checkCatch()){ caughtAction(); return; }
            if (checkHouse()) return;

            gameState = "playStep1";
            updateMessage();
          }
          return;
        }
      }
    }
  });

  /* --- ゲーム開始 --- */

  document.getElementById("startBtn").addEventListener("click", ()=>{
    if(gameState === "ready"){
      gameState = "playStep1";
      updateMessage();
    }
  });

  /* --- リセット（レベルアップ含む） --- */

  document.getElementById("resetBtn").addEventListener("click", ()=>{

    if (gameState === "caughtEnd") {
      childLevel++;
      if (childLevel > 5) childLevel = 1;
    }

    if (gameState === "clearEnd") {
      oniLevel++;
      if (oniLevel > 4) oniLevel = 1;
    }

    updateChildImage();
    updateOniImage();

    playerNode = null;
    oniNode = null;
    houseNode = null;
    turn = 0;
    gameState = "setPlayer";
    document.getElementById("startBtn").disabled = true;

    player.style.display = "none";
    oni.style.display = "none";
    house.style.display = "none";

    /* ★ 点滅解除（今回の修正ポイント） */
    player.classList.remove("blink");
    oni.classList.remove("blink");
    house.classList.remove("blink");

    clearBridges();
    generateEdges();
    drawBridges();
    rebuildGraph();

    renderCharacters();
    updateMessage();
  });
</script>

</body>
</html>
